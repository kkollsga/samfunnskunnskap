<!DOCTYPE html>

<head>

    <style>
        /* Prevent scroll bounce on iOS */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        #app {
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        #mainContent {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            height: 100%;
        }
        
        /* Animations - Cannot be replaced with Tailwind */
        @keyframes borderGlow {
            0% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.5), 0 0 10px rgba(34, 197, 94, 0.3), 0 0 15px rgba(34, 197, 94, 0.1); }
            50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.8), 0 0 30px rgba(34, 197, 94, 0.5), 0 0 40px rgba(34, 197, 94, 0.3); }
            100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.5), 0 0 10px rgba(34, 197, 94, 0.3), 0 0 15px rgba(34, 197, 94, 0.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
        }
        
        /* Animation classes */
        .border-glow {
            animation: borderGlow 1s ease-in-out;
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        
        .notification {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        /* Translation tooltip - some properties must stay in CSS */
        .translation-tooltip {
            animation: fadeIn 0.2s ease-out;
        }
        
        /* Text marker animation */
        .translation-text-marker {
            animation: blink 1s ease-in-out infinite;
        }
        
        /* Active translation state background */
        .translating {
            background-color: rgba(59, 130, 246, 0.08) !important;
            transition: background-color 0.2s ease;
        }
        
        .dark .translating {
            background-color: rgba(59, 130, 246, 0.15) !important;
        }
        
        /* Prevent text selection on mobile */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* Modal animations */
        .modal-backdrop {
            animation: fadeIn 0.2s ease-out;
        }
        
        .modal-content {
            animation: slideUp 0.3s ease-out;
        }
        
        /* Alternative button states - colors that can't be done with Tailwind */
        .alternative-btn.correct {
            background-color: rgba(34, 197, 94, 0.15);
            border-color: rgb(34 197 94);
            color: rgb(21 128 61);
        }
        
        .dark .alternative-btn.correct {
            background-color: rgba(34, 197, 94, 0.2);
            border-color: rgb(34 197 94);
            color: rgb(134 239 172);
        }
        
        .alternative-btn.incorrect {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: rgb(239 68 68);
            color: rgb(185 28 28);
        }
        
        .dark .alternative-btn.incorrect {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: rgb(239 68 68);
            color: rgb(252 165 165);
        }
        
        .alternative-btn.translating {
            border-color: rgba(59, 130, 246, 0.5) !important;
        }

        .alternative-btn:focus {
            outline: none;
        }
    </style>

<script>
console.log("Version: 1.08");

// Central State Management
class StateManager {
    constructor() {
        this.state = {
            currentLanguage: 'pb',
            userProgress: [],
            questionHistory: {}, // { questionId: { attempts, failures, lastAttempt, lastCorrect, streak } }
            sectionStats: {},   // { sectionId: { totalAttempts, totalCorrect, lastPracticed } }
            darkMode: false,
            currentQuiz: null,
            currentView: 'main',
            viewingIndex: null, // For navigation within quiz
            translatedWords: new Set()
        };
        
        this.listeners = [];
        this.loadFromStorage();
    }
    
    loadFromStorage() {
        const stored = localStorage.getItem('appState');
        if (stored) {
            const parsed = JSON.parse(stored);
            // Restore non-serializable types
            this.state = {
                ...parsed,
                translatedWords: new Set(parsed.translatedWords || [])
            };
            // Ensure new state fields exist for old localStorage data
            if (!this.state.questionHistory) {
                this.state.questionHistory = {};
            }
            if (!this.state.sectionStats) {
                this.state.sectionStats = {};
            }
            // Migrate old questionHistory entries missing lastCorrect/streak
            for (const h of Object.values(this.state.questionHistory)) {
                if (h.lastCorrect === undefined) {
                    h.lastCorrect = h.failures < h.attempts;
                    h.streak = h.lastCorrect ? 1 : 0;
                }
            }
        }
    }
    
    saveToStorage() {
        const toStore = {
            ...this.state,
            translatedWords: Array.from(this.state.translatedWords)
        };
        localStorage.setItem('appState', JSON.stringify(toStore));
    }
    
    get(key) {
        return this.state[key];
    }
    
    set(key, value) {
        this.state[key] = value;
        this.saveToStorage();
        this.notifyListeners(key, value);
    }
    
    update(updates) {
        Object.assign(this.state, updates);
        this.saveToStorage();
        Object.keys(updates).forEach(key => {
            this.notifyListeners(key, updates[key]);
        });
    }
    
    subscribe(listener) {
        this.listeners.push(listener);
    }
    
    notifyListeners(key, value) {
        this.listeners.forEach(listener => listener(key, value));
    }
    
    addProgress(answer) {
        const progress = this.get('userProgress') || [];
        progress.push(answer);
        // Keep only last 300 answers
        if (progress.length > 300) {
            progress.shift();
        }
        this.set('userProgress', progress);

        // Update cumulative sectionStats
        const stats = this.state.sectionStats || {};
        const section = answer.section;
        if (!stats[section]) {
            stats[section] = { totalAttempts: 0, totalCorrect: 0, lastPracticed: 0 };
        }
        stats[section].totalAttempts++;
        if (answer.correct) stats[section].totalCorrect++;
        stats[section].lastPracticed = Date.now();
        this.set('sectionStats', stats);
    }
    
    getSectionStats(sectionId) {
        const progress = this.get('userProgress') || [];
        const sectionAnswers = progress.filter(p => 
            p.section === sectionId || p.section.startsWith(sectionId + '.')
        );
        
        if (sectionAnswers.length === 0) {
            return { correct: 50, translation: 0, count: 0 };
        }
        
        const correct = (sectionAnswers.filter(a => a.correct).length / sectionAnswers.length) * 100;
        const translation = sectionAnswers.reduce((sum, a) => sum + (a.translationPercent || 0), 0) / sectionAnswers.length;
        
        return {
            correct: Math.round(correct),
            translation: Math.round(translation),
            count: sectionAnswers.length
        };
    }

    updateQuestionHistory(questionId, isCorrect) {
        const history = this.state.questionHistory;
        if (!history[questionId]) {
            history[questionId] = { attempts: 0, failures: 0, lastAttempt: 0, lastCorrect: false, streak: 0 };
        }
        const h = history[questionId];
        h.attempts++;
        if (!isCorrect) {
            h.failures++;
            h.streak = 0;
        } else {
            h.streak = (h.streak || 0) + 1;
        }
        h.lastCorrect = isCorrect;
        h.lastAttempt = Date.now();
        this.set('questionHistory', history);
    }
}

// Data Manager
class DataManager {
    constructor() {
        this.descriptions = {};
        this.questions = {};
    }
    
    async loadData() {
        try {
            const loadFile = async (filename) => {
                const response = await fetch(`./${filename}`);
                if (!response.ok) throw new Error(`Failed to load ${filename}`);
                return await response.json();
            };
            
            const [descNo, descPb, descEn, questNo, questPb, questEn] = await Promise.all([
                loadFile('description.json'),
                loadFile('description_pb.json'),
                loadFile('description_en.json'),
                loadFile('questions.json'),
                loadFile('questions_pb.json'),
                loadFile('questions_en.json')
            ]);
            
            this.descriptions = { no: descNo, pb: descPb, en: descEn };
            this.questions = { no: questNo, pb: questPb, en: questEn };
            
            return true;
        } catch (error) {
            console.error('Error loading data:', error);
            this.useSampleData();
            return false;
        }
    }
    
    useSampleData() {
        // Sample data for demo
        this.descriptions.no = [
            {
                id: "1",
                title: "Familie og helse",
                description: "Dette temaet gir en innføring i grunnleggende strukturer...",
                learning_goals: ["Forstå sammenhengen mellom utdanning..."],
                key_concepts: ["Samfunnsdeltakelse", "Integrering"]
            },
            {
                id: "1.1",
                title: "Skole og utdanning",
                url: "https://samfunnskunnskap.no/nb/skole-og-utdanning.html",
                description: "Det norske utdanningssystemet presenteres...",
                learning_goals: ["Beskrive hovedtrekkene i det norske utdanningsløpet..."],
                key_concepts: ["Grunnskole", "Videregående skole", "Høyere utdanning"]
            },
            {
                id: "2",
                title: "Demokrati og velferdsstat",
                description: "Demokrati og velferdsstat utforsker...",
                learning_goals: ["Forstå demokratiske prinsipper..."],
                key_concepts: ["Demokrati", "Velferdsstat"]
            }
        ];
        
        this.questions.no = [
            {
                id: "1_1",
                question: "Alle innvandrere i Norge har plikt til å ta norskopplæring.",
                alternatives: ["Rett", "Galt"],
                correct: 1,
                section: "1"
            },
            {
                id: "1.1_1",
                question: "Grunnskolen i Norge varer i 10 år.",
                alternatives: ["Rett", "Galt"],
                correct: 0,
                section: "1.1"
            },
            {
                id: "2_1",
                question: "Norge er et demokrati.",
                alternatives: ["Rett", "Galt"],
                correct: 0,
                section: "2"
            }
        ];
        
        // Clone for other languages
        this.questions.pb = this.questions.no.map(q => ({
            ...q,
            question: q.question + " (PT)",
            alternatives: ["Certo", "Errado"]
        }));
        
        this.questions.en = this.questions.no.map(q => ({
            ...q,
            question: q.question + " (EN)",
            alternatives: ["Right", "Wrong"]
        }));
        
        this.descriptions.pb = this.descriptions.no;
        this.descriptions.en = this.descriptions.no;
    }
    
    getDescription(id, lang = 'no') {
        return this.descriptions[lang]?.find(d => d.id === id);
    }
    
    getQuestions(sectionId = null, lang = 'no') {
        let questions = this.questions[lang] || [];
        if (sectionId) {
            questions = questions.filter(q => 
                q.section === sectionId || q.section.startsWith(sectionId + '.')
            );
        }
        return questions;
    }
    
    getSubtopics(parentId, lang = 'no') {
        return this.descriptions[lang]?.filter(d => 
            d.id.startsWith(parentId + '.') && d.id.split('.').length === 2
        ) || [];
    }
    
    getParentTopic(childId, lang = 'no') {
        if (!childId.includes('.')) return null;
        const parentId = childId.split('.')[0];
        return this.getDescription(parentId, lang);
    }
}

// Quiz Manager
class QuizManager {
    constructor(stateManager, dataManager) {
        this.state = stateManager;
        this.data = dataManager;
    }
    
    startQuiz(topicId = null) {
        const questions = this.selectQuestions(topicId);
        
        if (questions.length === 0) {
            app.ui.showNotification('No questions available', 'error');
            return false;
        }
        
        this.state.update({
            currentQuiz: {
                questions: questions,
                currentIndex: 0,
                answers: [],
                startTime: Date.now(),
                topicId: topicId
            },
            currentView: 'quiz',
            viewingIndex: null
        });
        
        return true;
    }
    
    classifyQuestion(questionId, history, masteryBoost = 0) {
        const h = history[questionId];
        if (!h || h.attempts === 0) return 'unseen';
        if (!h.lastCorrect) return 'active-fail';
        // Green requires 3 correct + 2 extra per failure + boost at high mastery
        const requiredStreak = 3 + (h.failures * 2) + masteryBoost;
        if ((h.streak || 0) >= requiredStreak) return 'mastered';
        return 'recovering';
    }

    getMasteryBoost(allQuestions, history) {
        if (allQuestions.length === 0) return 0;
        // First pass: count mastered at base threshold (no boost)
        let mastered = 0;
        for (const q of allQuestions) {
            const h = history[q.id];
            if (h && h.lastCorrect) {
                const base = 3 + (h.failures * 2);
                if ((h.streak || 0) >= base) mastered++;
            }
        }
        const ratio = mastered / allQuestions.length;
        // At 80%+ mastery, raise thresholds progressively
        if (ratio >= 0.95) return 4;
        if (ratio >= 0.90) return 3;
        if (ratio >= 0.85) return 2;
        if (ratio >= 0.80) return 1;
        return 0;
    }

    getSpacedInterval(streak) {
        // Increasing intervals: 1d, 2d, 4d, 7d, 14d, then cap at 14d
        const days = [0, 1, 2, 4, 7, 14];
        const d = days[Math.min(streak, days.length - 1)] || 14;
        return d * 86400000;
    }

    weightedPick(arr, n, weightFn) {
        const items = arr.map(q => ({ q, w: weightFn(q) }));
        const picked = [];
        for (let i = 0; i < n && items.length > 0; i++) {
            const total = items.reduce((s, x) => s + x.w, 0);
            let r = Math.random() * total;
            for (let j = 0; j < items.length; j++) {
                r -= items[j].w;
                if (r <= 0) {
                    picked.push(items[j].q);
                    items.splice(j, 1);
                    break;
                }
            }
        }
        return picked;
    }

    calculateSlotAllocation(count, stage, activeFailCount, recoveringDueCount, unseenCount, masteredCount) {
        let base;
        switch (stage) {
            case 'early':
                base = { activeFail: 0.20, recovering: 0.10, unseen: 0.60, mastered: 0.10 };
                break;
            case 'mid':
                base = { activeFail: 0.25, recovering: 0.15, unseen: 0.40, mastered: 0.20 };
                break;
            default: // advanced
                base = { activeFail: 0.25, recovering: 0.25, unseen: 0.15, mastered: 0.35 };
        }

        // Dynamic scaling: boost active-fail if many failures relative to seen questions
        const totalSeen = activeFailCount + recoveringDueCount + masteredCount;
        if (totalSeen > 0) {
            const failRatio = activeFailCount / totalSeen;
            if (failRatio > 0.1) {
                const boost = Math.min(failRatio, 0.5) * 0.4;
                base.activeFail = Math.min(0.50, base.activeFail + boost);
                const reduction = boost;
                const unseenShare = base.unseen / (base.unseen + base.mastered || 1);
                base.unseen = Math.max(0, base.unseen - reduction * unseenShare);
                base.mastered = Math.max(0, base.mastered - reduction * (1 - unseenShare));
            }
        }

        // Convert to slot counts, capped by available
        const slots = {
            activeFail: Math.min(Math.round(count * base.activeFail), activeFailCount),
            recovering: Math.min(Math.round(count * base.recovering), recoveringDueCount),
            unseen:     Math.min(Math.round(count * base.unseen), unseenCount),
            mastered:   Math.min(Math.round(count * base.mastered), masteredCount)
        };

        // Redistribute unused slots in priority order
        let deficit = count - (slots.activeFail + slots.recovering + slots.unseen + slots.mastered);
        const available = {
            unseen:     unseenCount - slots.unseen,
            recovering: recoveringDueCount - slots.recovering,
            mastered:   masteredCount - slots.mastered,
            activeFail: activeFailCount - slots.activeFail
        };
        for (const bucket of ['unseen', 'recovering', 'mastered', 'activeFail']) {
            if (deficit <= 0) break;
            const canAdd = Math.min(deficit, available[bucket]);
            if (canAdd > 0) {
                slots[bucket] += canAdd;
                deficit -= canAdd;
            }
        }

        return slots;
    }

    selectQuestions(topicId) {
        const allQuestions = this.data.getQuestions(topicId, 'no');
        const history = this.state.get('questionHistory') || {};
        const sectionStats = this.state.get('sectionStats') || {};
        const count = Math.min(20, allQuestions.length);
        const now = Date.now();

        // Classify all questions into buckets (with mastery boost at high completion)
        const boost = this.getMasteryBoost(allQuestions, history);
        const buckets = { unseen: [], activeFail: [], recovering: [], mastered: [] };
        for (const q of allQuestions) {
            const state = this.classifyQuestion(q.id, history, boost);
            if (state === 'active-fail') buckets.activeFail.push(q);
            else if (state === 'recovering') buckets.recovering.push(q);
            else if (state === 'mastered') buckets.mastered.push(q);
            else buckets.unseen.push(q);
        }

        // Filter recovering: only include those whose spaced interval has elapsed
        const recoveringDue = buckets.recovering.filter(q => {
            const h = history[q.id];
            return (now - h.lastAttempt) >= this.getSpacedInterval(h.streak || 0);
        });

        // Determine learning stage from unseen ratio
        const unseenRatio = allQuestions.length > 0 ? buckets.unseen.length / allQuestions.length : 1;
        const stage = unseenRatio > 0.6 ? 'early' : unseenRatio > 0.2 ? 'mid' : 'advanced';

        // Calculate slot allocation
        const slots = this.calculateSlotAllocation(
            count, stage,
            buckets.activeFail.length, recoveringDue.length,
            buckets.unseen.length, buckets.mastered.length
        );

        const selected = [];

        // 1. Active-fail: weight by fail rate * recency
        selected.push(...this.weightedPick(buckets.activeFail, slots.activeFail, q => {
            const h = history[q.id];
            const failRate = h.failures / h.attempts;
            const daysSince = (now - h.lastAttempt) / 86400000;
            return failRate * (1 + Math.min(daysSince, 30) / 30);
        }));

        // 2. Recovering-due: weight by how overdue
        selected.push(...this.weightedPick(recoveringDue, slots.recovering, q => {
            const h = history[q.id];
            const interval = this.getSpacedInterval(h.streak || 0);
            return Math.max(1, (now - h.lastAttempt) / interval);
        }));

        // 3. Unseen: weight by topic weakness * topic recency
        selected.push(...this.weightedPick(buckets.unseen, slots.unseen, q => {
            const ss = sectionStats[q.section];
            let weaknessWeight = 1.5; // default for never-practiced sections
            if (ss && ss.totalAttempts >= 3) {
                weaknessWeight = 2 - (ss.totalCorrect / ss.totalAttempts);
            }
            let recencyWeight = 2.0; // default for never-practiced sections
            if (ss && ss.lastPracticed > 0) {
                const daysSince = (now - ss.lastPracticed) / 86400000;
                recencyWeight = 1 + Math.min(daysSince, 14) / 14;
            }
            return weaknessWeight * recencyWeight;
        }));

        // 4. Mastered: light recency weight
        selected.push(...this.weightedPick(buckets.mastered, slots.mastered, q => {
            const h = history[q.id];
            const daysSince = (now - h.lastAttempt) / 86400000;
            return 1 + Math.min(daysSince, 30) / 60;
        }));

        // Fill any remaining slots from whatever is left
        if (selected.length < count) {
            const selectedIds = new Set(selected.map(q => q.id));
            const remaining = allQuestions.filter(q => !selectedIds.has(q.id));
            selected.push(...this.weightedPick(remaining, count - selected.length, () => 1));
        }

        // Final shuffle
        return selected.sort(() => Math.random() - 0.5);
    }
    
    getOverallStats(topicId = null) {
        const allQuestions = this.data.getQuestions(topicId, 'no');
        const history = this.state.get('questionHistory') || {};
        const now = Date.now();

        const boost = this.getMasteryBoost(allQuestions, history);
        const counts = { unseen: 0, activeFail: 0, recovering: 0, mastered: 0 };
        let totalAttempts = 0, totalCorrect = 0;

        for (const q of allQuestions) {
            const state = this.classifyQuestion(q.id, history, boost);
            counts[state === 'active-fail' ? 'activeFail' : state]++;
            const h = history[q.id];
            if (h && h.attempts > 0) {
                totalAttempts += h.attempts;
                totalCorrect += h.attempts - h.failures;
            }
        }

        const total = allQuestions.length;
        const seen = total - counts.unseen;
        const unseenRatio = total > 0 ? counts.unseen / total : 1;
        const stage = unseenRatio > 0.6 ? 'early' : unseenRatio > 0.2 ? 'mid' : 'advanced';
        const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
        const completionPct = total > 0 ? Math.round((seen / total) * 100) : 0;

        // Per-section accuracy for weakest/strongest
        const sectionStats = this.state.get('sectionStats') || {};
        const sections = this.data.descriptions.no?.filter(d => !d.id.includes('.')) || [];
        const sectionAccuracies = sections.map(s => {
            const ss = sectionStats[s.id];
            const acc = ss && ss.totalAttempts >= 3 ? Math.round((ss.totalCorrect / ss.totalAttempts) * 100) : null;
            return { id: s.id, title: s.title, accuracy: acc, attempts: ss?.totalAttempts || 0 };
        }).filter(s => s.accuracy !== null);

        let weakest = null, strongest = null;
        if (sectionAccuracies.length > 0) {
            weakest = sectionAccuracies.reduce((a, b) => a.accuracy < b.accuracy ? a : b);
            strongest = sectionAccuracies.reduce((a, b) => a.accuracy > b.accuracy ? a : b);
            if (weakest.accuracy === strongest.accuracy) strongest = null;
        }

        return { total, seen, counts, stage, accuracy, completionPct, totalAttempts, weakest, strongest };
    }

    answerQuestion(answerIndex) {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return;
        
        const question = quiz.questions[quiz.currentIndex];
        const isCorrect = answerIndex === question.correct;
        
        // Get translation percentage from TranslationManager
        const translationPercent = app.translation.getCurrentPercentage();
        
        const answer = {
            questionId: question.id,
            section: question.section,
            correct: isCorrect,
            answerIndex: answerIndex,
            translationPercent: translationPercent,
            timestamp: Date.now()
        };
        
        quiz.answers.push(answer);
        this.state.addProgress(answer);
        this.state.updateQuestionHistory(question.id, isCorrect);

        // Update quiz state
        this.state.set('currentQuiz', quiz);
        
        return { isCorrect, correctIndex: question.correct };
    }
    
    calculateTranslationPercent() {
        // Simplified - just return a random percentage for now
        return Math.floor(Math.random() * 100);
    }
    
    nextQuestion() {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return false;
        
        if (quiz.currentIndex < quiz.questions.length - 1) {
            quiz.currentIndex++;
            this.state.update({
                currentQuiz: quiz,
                viewingIndex: null  // Clear viewing index when moving to next question
            });
            return true;
        }
        return false;
    }
    
    navigateToQuestion(index) {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return;
        
        // Can only navigate to answered questions or current question
        if (index >= 0 && index <= quiz.currentIndex && index < quiz.questions.length) {
            this.state.set('viewingIndex', index);
        }
    }
    
    getCurrentQuestion() {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return null;
        
        const viewingIndex = this.state.get('viewingIndex');
        const index = viewingIndex !== null ? viewingIndex : quiz.currentIndex;
        
        return quiz.questions[index];
    }
    
    getCurrentQuestionIndex() {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return 0;
        
        const viewingIndex = this.state.get('viewingIndex');
        return viewingIndex !== null ? viewingIndex : quiz.currentIndex;
    }

    // Add new method to QuizManager class
    isQuestionAnswered(index) {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return false;
        
        // Check if there's an answer for this specific question index
        return index < quiz.answers.length;
    }

    // Add new method to QuizManager class  
    isViewingCurrentQuestion() {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return false;
        
        const viewingIndex = this.state.get('viewingIndex');
        return viewingIndex === null || viewingIndex === quiz.currentIndex;
    }

    
    getQuizProgress() {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return { current: 0, total: 0, percentage: 0 };
        
        const currentIndex = this.getCurrentQuestionIndex();
        
        return {
            current: currentIndex + 1,
            total: quiz.questions.length,
            percentage: ((currentIndex + 1) / quiz.questions.length) * 100,
            canGoBack: currentIndex > 0,
            canGoForward: currentIndex < quiz.currentIndex
        };
    }
    
    calculateResults() {
        const quiz = this.state.get('currentQuiz');
        if (!quiz) return null;
        
        const correct = quiz.answers.filter(a => a.correct).length;
        const percentage = Math.round((correct / quiz.answers.length) * 100);
        const avgTranslation = Math.round(
            quiz.answers.reduce((sum, a) => sum + a.translationPercent, 0) / quiz.answers.length
        );
        
        return {
            correct,
            total: quiz.answers.length,
            percentage,
            avgTranslation,
            duration: Date.now() - quiz.startTime
        };
    }
}

// Translation Manager
class TranslationManager {
    constructor(stateManager, dataManager) {
        this.state = stateManager;
        this.data = dataManager;
        this.currentQuestionChars = new Map(); // Maps element to character positions
        this.translatedTexts = {}; // Stores translations for current question
        this.totalChars = 0;
        this.uniqueChars = new Set();
        this.translatedChars = new Set();
        this.isTranslating = false;
        this.pressTimer = null;
        this.currentElement = null;
        this.currentCharIndex = null;
        this.contextRadius = 15; // Characters to show on each side
        this.charPositionsCache = new WeakMap(); // Cache character positions for performance
        this.scrollDisableTimer = null; // Timer for delayed scroll disable
        this.originalScrollStyles = {}; // Store original scroll styles
    }
    
    // Disable scrolling with a delay
    disableScrolling() {
        // Clear any existing timer
        if (this.scrollDisableTimer) {
            clearTimeout(this.scrollDisableTimer);
        }
        
        // Set a small delay before disabling scroll (150ms)
        this.scrollDisableTimer = setTimeout(() => {
            const mainContent = document.getElementById('mainContent');
            const body = document.body;
            const html = document.documentElement;
            
            // Store original styles
            this.originalScrollStyles = {
                mainContent: {
                    overflow: mainContent.style.overflow,
                    touchAction: mainContent.style.touchAction
                },
                body: {
                    overflow: body.style.overflow,
                    touchAction: body.style.touchAction
                },
                html: {
                    overflow: html.style.overflow,
                    touchAction: html.style.touchAction
                }
            };
            
            // Disable scrolling
            mainContent.style.overflow = 'hidden';
            mainContent.style.touchAction = 'none';
            body.style.overflow = 'hidden';
            body.style.touchAction = 'none';
            html.style.overflow = 'hidden';
            html.style.touchAction = 'none';
        }, 150);
    }
    
    // Re-enable scrolling
    enableScrolling() {
        // Clear any pending timer
        if (this.scrollDisableTimer) {
            clearTimeout(this.scrollDisableTimer);
            this.scrollDisableTimer = null;
        }
        
        // Restore original styles
        const mainContent = document.getElementById('mainContent');
        const body = document.body;
        const html = document.documentElement;
        
        if (this.originalScrollStyles.mainContent) {
            mainContent.style.overflow = this.originalScrollStyles.mainContent.overflow || '';
            mainContent.style.touchAction = this.originalScrollStyles.mainContent.touchAction || '';
        }
        if (this.originalScrollStyles.body) {
            body.style.overflow = this.originalScrollStyles.body.overflow || '';
            body.style.touchAction = this.originalScrollStyles.body.touchAction || '';
        }
        if (this.originalScrollStyles.html) {
            html.style.overflow = this.originalScrollStyles.html.overflow || '';
            html.style.touchAction = this.originalScrollStyles.html.touchAction || '';
        }
    }
    
    setupEventListeners() {
        const tooltip = document.getElementById('translationTooltip');
        
        const updateTranslation = (element, x, y) => {
            if (!element || !element.classList.contains('translatable')) return;
            
            const charInfo = this.getCharAtPosition(element, x, y);
            if (!charInfo) return;
            
            // Check if we're at a different position
            if (element !== this.currentElement || charInfo.index !== this.currentCharIndex) {
                // Remove previous highlighting
                this.removeCharacterHighlight();
                
                // Highlight current character
                this.highlightCharacter(element, charInfo.index);
                
                const translation = this.getTranslationWithContext(element, charInfo.index);
                if (!translation) return;
                
                // Track characters in range as translated
                const text = element.textContent;
                const startIdx = Math.max(0, charInfo.index - this.contextRadius);
                const endIdx = Math.min(text.length, charInfo.index + this.contextRadius);
                
                for (let i = startIdx; i < endIdx; i++) {
                    const char = text[i].toLowerCase();
                    if (char.match(/[a-zæøå]/i)) { // Only count letters
                        this.translatedChars.add(`${element.getAttribute('data-translation-key')}_${i}`);
                    }
                }
                
                this.updateTranslationPercentage();
                
                // Update tooltip content
                tooltip.textContent = translation;
                
                // Position tooltip above the element
                const rect = element.getBoundingClientRect();
                const tooltipHeight = 50; // Approximate height
                
                // Calculate position
                let top = rect.top - tooltipHeight - 15;
                let left = x;
                
                // Ensure tooltip stays within viewport
                if (top < 10) {
                    top = rect.bottom + 15; // Show below if no room above
                }
                
                // Get tooltip width after content is set
                tooltip.classList.remove('hidden');
                const tooltipRect = tooltip.getBoundingClientRect();
                
                // Center on cursor and keep within viewport
                left = Math.max(10, Math.min(left - tooltipRect.width / 2, window.innerWidth - tooltipRect.width - 10));
                
                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
                
                // Update state
                this.currentElement = element;
                this.currentCharIndex = charInfo.index;
                
                // Update active state
                document.querySelectorAll('.translating').forEach(el => {
                    if (el !== element) el.classList.remove('translating');
                });
                element.classList.add('translating');
            }
        };
        
        const startTranslation = (element, x, y) => {
            if (!element || !element.classList.contains('translatable')) return;
            
            this.isTranslating = true;
            
            // Disable scrolling with delay
            this.disableScrolling();
            
            // Add haptic feedback if available
            if ('vibrate' in navigator) {
                navigator.vibrate(10);
            }
            
            updateTranslation(element, x, y);
        };
        
        const hideTranslation = () => {
            tooltip.classList.add('hidden');
            this.removeCharacterHighlight();
            this.isTranslating = false;
            this.currentElement = null;
            this.currentCharIndex = null;
            
            // Re-enable scrolling
            this.enableScrolling();
            
            // Remove active state from all elements
            document.querySelectorAll('.translating').forEach(el => {
                el.classList.remove('translating');
            });
            
            if (this.pressTimer) {
                clearTimeout(this.pressTimer);
                this.pressTimer = null;
            }
        };
        
        // Prevent clicks when translating
        document.addEventListener('click', (e) => {
            if (this.isTranslating) {
                e.preventDefault();
                e.stopPropagation();
                e.stopImmediatePropagation();
            }
        }, true);
        
        // Touch events for mobile
        let touchStartElement = null;
        
        document.addEventListener('touchstart', (e) => {
            const target = e.target.closest('.translatable');
            if (target) {
                touchStartElement = target;
                const touch = e.touches[0];
                
                this.pressTimer = setTimeout(() => {
                    e.preventDefault();
                    startTranslation(target, touch.clientX, touch.clientY);
                }, 500);
            }
        });
        
        document.addEventListener('touchmove', (e) => {
            if (this.isTranslating) {
                e.preventDefault();
                const touch = e.touches[0];
                const element = document.elementFromPoint(touch.clientX, touch.clientY);
                const translatable = element?.closest('.translatable');
                
                if (translatable) {
                    updateTranslation(translatable, touch.clientX, touch.clientY);
                } else {
                    // Hide tooltip if not over translatable element
                    tooltip.classList.add('hidden');
                    this.removeCharacterHighlight();
                    if (this.currentElement) {
                        this.currentElement.classList.remove('translating');
                    }
                }
            } else if (this.pressTimer && touchStartElement) {
                // Cancel timer if moved before activation
                const touch = e.touches[0];
                const rect = touchStartElement.getBoundingClientRect();
                const movedOut = touch.clientX < rect.left - 10 ||
                               touch.clientX > rect.right + 10 ||
                               touch.clientY < rect.top - 10 ||
                               touch.clientY > rect.bottom + 10;
                
                if (movedOut) {
                    clearTimeout(this.pressTimer);
                    this.pressTimer = null;
                }
            }
        });
        
        document.addEventListener('touchend', (e) => {
            if (this.isTranslating) {
                e.preventDefault();
                e.stopPropagation();
            }
            touchStartElement = null;
            hideTranslation();
        });
        
        document.addEventListener('touchcancel', () => {
            touchStartElement = null;
            hideTranslation();
        });
        
        // Mouse events for desktop testing
        let mouseTimer;
        let mouseDownTarget = null;
        
        document.addEventListener('mousedown', (e) => {
            const target = e.target.closest('.translatable');
            if (target) {
                mouseDownTarget = target;
                
                mouseTimer = setTimeout(() => {
                    e.preventDefault();
                    startTranslation(target, e.clientX, e.clientY);
                }, 500);
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (this.isTranslating) {
                e.preventDefault();
                const element = e.target.closest('.translatable');
                
                if (element) {
                    updateTranslation(element, e.clientX, e.clientY);
                } else {
                    // Hide tooltip if not over translatable element
                    tooltip.classList.add('hidden');
                    this.removeCharacterHighlight();
                    if (this.currentElement) {
                        this.currentElement.classList.remove('translating');
                    }
                }
            } else if (mouseTimer && mouseDownTarget) {
                // Cancel timer if moved too much
                const rect = mouseDownTarget.getBoundingClientRect();
                const movedOut = e.clientX < rect.left - 5 ||
                               e.clientX > rect.right + 5 ||
                               e.clientY < rect.top - 5 ||
                               e.clientY > rect.bottom + 5;
                
                if (movedOut) {
                    clearTimeout(mouseTimer);
                    mouseTimer = null;
                    mouseDownTarget = null;
                }
            }
        });
        
        document.addEventListener('mouseup', (e) => {
            if (this.isTranslating) {
                e.preventDefault();
                e.stopPropagation();
            }
            clearTimeout(mouseTimer);
            mouseTimer = null;
            mouseDownTarget = null;
            hideTranslation();
        });
        
        document.addEventListener('contextmenu', (e) => {
            if (this.isTranslating) {
                e.preventDefault();
            }
        });
    }
    
    // Get character positions for an element
    getCharacterPositions(element) {
        // Check cache first
        if (this.charPositionsCache.has(element)) {
            return this.charPositionsCache.get(element);
        }
        
        const text = element.textContent;
        const positions = [];
        
        // Temporarily wrap each character in a span to get exact positions
        const originalHTML = element.innerHTML;
        element.innerHTML = '';
        
        for (let i = 0; i < text.length; i++) {
            const span = document.createElement('span');
            span.textContent = text[i];
            element.appendChild(span);
        }
        
        // Get position of each character span
        const spans = element.querySelectorAll('span');
        spans.forEach((span, index) => {
            const rect = span.getBoundingClientRect();
            positions.push({
                index: index,
                left: rect.left,
                right: rect.right,
                top: rect.top,
                bottom: rect.bottom,
                centerX: rect.left + rect.width / 2,
                centerY: rect.top + rect.height / 2
            });
        });
        
        // Restore original content
        element.innerHTML = originalHTML;
        
        // Cache the positions
        this.charPositionsCache.set(element, positions);
        
        // Clear cache after a short delay (in case of resize/reflow)
        setTimeout(() => {
            this.charPositionsCache.delete(element);
        }, 1000);
        
        return positions;
    }
    
    // Get character at specific position using exact character positions
    getCharAtPosition(element, x, y) {
        const text = this.currentQuestionChars.get(element);
        if (!text || text.length === 0) return null;
        
        // Get exact character positions
        const positions = this.getCharacterPositions(element);
        
        // Find the character closest to the touch point
        let closestChar = null;
        let minDistance = Infinity;
        
        positions.forEach(pos => {
            // Calculate distance from touch point to character center
            const distance = Math.sqrt(
                Math.pow(x - pos.centerX, 2) + 
                Math.pow(y - pos.centerY, 2)
            );
            
            // Also check if the point is within the character's bounding box
            const isWithinChar = x >= pos.left && x <= pos.right && 
                               y >= pos.top && y <= pos.bottom;
            
            // Prefer characters that contain the point, otherwise use closest
            if (isWithinChar) {
                if (!closestChar || distance < minDistance) {
                    minDistance = distance;
                    closestChar = pos;
                }
            } else if (!closestChar || (!closestChar.isWithin && distance < minDistance)) {
                minDistance = distance;
                closestChar = pos;
                closestChar.isWithin = false;
            }
        });
        
        if (closestChar) {
            return {
                index: closestChar.index,
                char: text[closestChar.index] || ''
            };
        }
        
        // Fallback to first character if nothing found
        return {
            index: 0,
            char: text[0] || ''
        };
    }
    
    // Highlight a specific character by wrapping it in a span
    highlightCharacter(element, charIndex) {
        const text = element.textContent;
        if (charIndex < 0 || charIndex >= text.length) return;
        
        // Store original text if not already stored
        if (!element.hasAttribute('data-original-text')) {
            element.setAttribute('data-original-text', text);
        }
        
        // Create new content with highlighted character
        const beforeText = text.substring(0, charIndex);
        const charText = text[charIndex];
        const afterText = text.substring(charIndex + 1);
        
        element.innerHTML = '';
        
        if (beforeText) {
            element.appendChild(document.createTextNode(beforeText));
        }
        
        const charSpan = document.createElement('span');
        charSpan.className = 'text-red-500 font-bold';
        charSpan.textContent = charText;
        element.appendChild(charSpan);
        
        if (afterText) {
            element.appendChild(document.createTextNode(afterText));
        }
    }
    
    // Remove character highlighting and restore original text
    removeCharacterHighlight() {
        if (this.currentElement && this.currentElement.hasAttribute('data-original-text')) {
            const originalText = this.currentElement.getAttribute('data-original-text');
            this.currentElement.textContent = originalText;
            // Clear position cache when content changes
            this.charPositionsCache.delete(this.currentElement);
        }
    }
    
    // Initialize translation data for current question
    initializeQuestion(questionNo, questionPbEn) {
        this.currentQuestionChars.clear();
        this.translatedTexts = {};
        this.totalChars = 0;
        this.uniqueChars.clear();
        this.translatedChars.clear();
        this.charPositionsCache = new WeakMap(); // Reset cache
        
        // Store translations
        if (questionPbEn) {
            this.translatedTexts.question = questionPbEn.question;
            questionPbEn.alternatives.forEach((alt, idx) => {
                this.translatedTexts[`alt_${idx}`] = alt;
            });
        }
        
        // Process all translatable elements after DOM update
        setTimeout(() => {
            document.querySelectorAll('.translatable').forEach(element => {
                const key = element.getAttribute('data-translation-key');
                const text = element.textContent;
                
                // Store character positions for this element
                this.currentQuestionChars.set(element, text);
                
                // Count unique letters for percentage calculation
                for (let i = 0; i < text.length; i++) {
                    const char = text[i].toLowerCase();
                    if (char.match(/[a-zæøå]/i)) { // Only count letters
                        this.uniqueChars.add(`${key}_${i}`);
                    }
                }
            });
            
            this.totalChars = this.uniqueChars.size;
            this.updateTranslationPercentage();
        }, 100);
    }
    
    // Get translation with context based on character position
    getTranslationWithContext(element, charIndex) {
        const key = element.getAttribute('data-translation-key');
        const norwegianText = element.getAttribute('data-original-text') || element.textContent;
        const translatedText = this.translatedTexts[key];
        
        if (!translatedText) return null;
        
        const norwegianLength = norwegianText.length;
        const translatedLength = translatedText.length;
        
        // Determine if we're near the beginning or end
        const isNearStart = charIndex <= this.contextRadius;
        const isNearEnd = charIndex >= norwegianLength - this.contextRadius - 1;
        
        let transStartIdx, transEndIdx;
        
        if (isNearStart) {
            // Show from the beginning
            transStartIdx = 0;
            transEndIdx = Math.min(translatedLength, this.contextRadius * 2 + 1);
        } else if (isNearEnd) {
            // Show to the end
            transEndIdx = translatedLength;
            transStartIdx = Math.max(0, translatedLength - (this.contextRadius * 2 + 1));
        } else {
            // Middle section - use proportional mapping
            const fractionalPosition = charIndex / (norwegianLength - 1);
            const translatedCenterIndex = Math.round(fractionalPosition * (translatedLength - 1));
            
            transStartIdx = Math.max(0, translatedCenterIndex - this.contextRadius);
            transEndIdx = Math.min(translatedLength, translatedCenterIndex + this.contextRadius + 1);
        }
        
        let translatedContext = translatedText.substring(transStartIdx, transEndIdx);
        
        // Add ellipsis only if we're actually truncating
        if (transStartIdx > 0) {
            translatedContext = '...' + translatedContext;
        }
        if (transEndIdx < translatedLength) {
            translatedContext = translatedContext + '...';
        }
        
        return translatedContext;
    }
    
    // Update translation percentage
    updateTranslationPercentage() {
        const percentEl = document.getElementById('translationPercent');
        if (!percentEl || this.totalChars === 0) return;
        
        const percentage = Math.min(100, Math.round((this.translatedChars.size / this.totalChars) * 100));
        percentEl.textContent = percentage;
    }
    
    // Get current translation percentage
    getCurrentPercentage() {
        if (this.totalChars === 0) return 0;
        return Math.min(100, Math.round((this.translatedChars.size / this.totalChars) * 100));
    }
    
    // Check if currently translating
    isInTranslationMode() {
        return this.isTranslating;
    }
    
    // Reset for new question
    reset() {
        this.removeCharacterHighlight();
        this.currentQuestionChars.clear();
        this.translatedTexts = {};
        this.totalChars = 0;
        this.uniqueChars.clear();
        this.translatedChars.clear();
        this.isTranslating = false;
        this.currentElement = null;
        this.currentCharIndex = null;
        this.charPositionsCache = new WeakMap();
        if (this.pressTimer) {
            clearTimeout(this.pressTimer);
            this.pressTimer = null;
        }
    }
}

        };
    }
    
    showNotification(message, type = 'success') {
        const container = document.getElementById('notificationContainer');
        const notification = document.createElement('div');
        const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
        
        notification.className = `notification bg-white dark:bg-gray-800 rounded-lg shadow-lg p-4 mb-2 flex items-center gap-3`;
        notification.innerHTML = `
            <div class="w-2 h-2 ${bgColor} rounded-full"></div>
            <span class="text-sm">${message}</span>
        `;
        
        container.appendChild(notification);
        
        setTimeout(() => {
            notification.style.animation = 'slideIn 0.3s ease-out reverse';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }
    
    showHeader(show = true) {
        document.getElementById('header').style.display = show ? 'flex' : 'none';
    }
    
    getContent() {
        return document.getElementById('mainContent');
    }
    
    getSectionColor(sectionId, subtopicIndex = null) {
        const mainSection = sectionId.split('.')[0];
        const colorScheme = this.themeColors[mainSection] || this.themeColors['1'];
        
        // If it's a main topic, return the 100 shade (lightest in new scheme)
        if (!sectionId.includes('.')) {
            const shade = colorScheme.shades['100'];
            return {
                ...shade,
                main: colorScheme.main
            };
        }
        
        // For subtopics, determine shade based on index
        let shadeKey = '200'; // Start from 200 for first subtopic
        
        if (subtopicIndex !== null) {
            // Map index to shade: 0->200, 1->300, 2->400, etc.
            const shadeMapping = ['200', '300', '400', '500'];
            shadeKey = shadeMapping[Math.min(subtopicIndex, shadeMapping.length - 1)];
        } else {
            // Try to extract index from section ID (e.g., "1.1" -> 0, "1.2" -> 1)
            const parts = sectionId.split('.');
            if (parts.length > 1) {
                const subIndex = parseInt(parts[1]) - 1; // Convert to 0-based
                const shadeMapping = ['200', '300', '400', '500'];
                shadeKey = shadeMapping[Math.min(subIndex, shadeMapping.length - 1)];
            }
        }
        
        const shade = colorScheme.shades[shadeKey];
        return {
            ...shade,
            main: colorScheme.main
        };
    }
    
    renderStars(percentage) {
        const stars = 5;
        const filledStars = Math.floor((percentage / 100) * stars);
        
        let html = '';
        for (let i = 0; i < stars; i++) {
            if (i < filledStars) {
                html += '<span class="inline-block text-yellow-400 text-2xl transition-colors duration-300">★</span>';
            } else {
                html += '<span class="inline-block text-gray-300 text-2xl transition-colors duration-300">★</span>';
            }
        }
        
        return html;
    }
}

// Main App Controller
class App {
    constructor() {
        this.state = new StateManager();
        this.data = new DataManager();
        this.quiz = new QuizManager(this.state, this.data);
        this.translation = new TranslationManager(this.state, this.data);
        this.ui = new UIManager(this.state);
        this.expandedSections = new Set();

        // Subscribe to state changes
        this.state.subscribe(this.onStateChange.bind(this));
    }

    toggleSection(sectionId) {
        if (this.expandedSections.has(sectionId)) {
            this.expandedSections.delete(sectionId);
        } else {
            this.expandedSections.clear();
            this.expandedSections.add(sectionId);
        }
        this.render();
    }

    collapseSection(sectionId, event) {
        event.stopPropagation();
        this.expandedSections.delete(sectionId);
        this.render();
    }
    
    async init() {
        await this.data.loadData();
        this.setupEventListeners();
        this.applySettings();
        this.render();
    }
    
    setupEventListeners() {
        // Language selector
        document.getElementById('languageSelector').addEventListener('change', (e) => {
            this.state.set('currentLanguage', e.target.value);
        });
        
        // Dark mode toggle
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            const darkMode = !this.state.get('darkMode');
            this.state.set('darkMode', darkMode);
            document.documentElement.classList.toggle('dark', darkMode);
            this.updateDarkModeIcon(darkMode);
        });
        
        // Translation events
        this.translation.setupEventListeners();
    }
    
    updateDarkModeIcon(isDark) {
        document.getElementById('moonIcon').classList.toggle('hidden', isDark);
        document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
    }

    applySettings() {
        // Sync dark mode: use saved preference, or detect OS on first visit
        let darkMode = this.state.get('darkMode');
        if (darkMode === undefined || darkMode === null) {
            darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            this.state.set('darkMode', darkMode);
        }
        document.documentElement.classList.toggle('dark', darkMode);
        this.updateDarkModeIcon(darkMode);

        // Set language
        document.getElementById('languageSelector').value = this.state.get('currentLanguage');
    }
    
    onStateChange(key, value) {
        if (key === 'currentView' || key === 'viewingIndex') {
            this.render();
        }
    }
    
    render() {
        const view = this.state.get('currentView');
        
        switch (view) {
            case 'quiz':
                this.renderQuiz();

                this.renderResults();
                break;
            default:
                this.renderMain();
        }

            { count: counts.activeFail, cls: 'bg-red-400' },
            { count: counts.unseen, cls: 'bg-gray-300 dark:bg-gray-600' }
        ];
        return segments
            .filter(s => s.count > 0)
            .map(s => `<div class="${s.cls} h-full" style="width:${(s.count / t) * 100}%"></div>`)
            .join('');
    }

    renderQuiz() {

        const progress = this.quiz.getQuizProgress();
        const quiz = this.state.get('currentQuiz');
        
        if (!question) {
            this.state.set('currentView', 'main');
            return;
        }
        
        // Initialize translations for this question
        const lang = this.state.get('currentLanguage');
        const questionTranslated = this.data.questions[lang]?.find(q => q.id === question.id);
        this.translation.initializeQuestion(question, questionTranslated);
        
        // Check if the specific question at this index has been answered
        const hasAnswered = this.quiz.isQuestionAnswered(currentIndex);
        
        // Check if we're viewing the current question (not history)
        const isViewingCurrent = this.quiz.isViewingCurrentQuestion();
        
        // Get main and subtopic information
        const mainSectionId = question.section.split('.')[0];
        const mainSection = this.data.getDescription(mainSectionId);
        const subtopic = question.section.includes('.') ? this.data.getDescription(question.section) : null;
        const mainColors = this.ui.getSectionColor(mainSectionId);
        const subtopicColors = subtopic ? this.ui.getSectionColor(question.section) : null;
        
        // Create shuffled alternatives with their original indices
        let shuffledAlternatives = question.alternatives.map((alt, index) => ({
            text: alt,
            originalIndex: index
        }));
        
        // Only shuffle if this is a new question (not viewing history)
        if (isViewingCurrent && !hasAnswered) {
            // Use a seeded random based on question ID and current time to ensure consistency during the question
            shuffledAlternatives = [...shuffledAlternatives].sort(() => Math.random() - 0.5);
            
            // Store the shuffle order for this question
            if (!quiz.shuffleOrders) {
                quiz.shuffleOrders = {};
            }
            quiz.shuffleOrders[currentIndex] = shuffledAlternatives;
        } else if (quiz.shuffleOrders && quiz.shuffleOrders[currentIndex]) {
            // Use the stored shuffle order when viewing history
            shuffledAlternatives = quiz.shuffleOrders[currentIndex];
        }
        
        content.innerHTML = `

                <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-3">
                        <div class="font-semibold">Tid brukt</div>
                        <div>${minutes}:${seconds.toString().padStart(2, '0')}</div>
                    </div>
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-3">
                        <div class="font-semibold">Oversettelse</div>
                        <div>${results.avgTranslation}%</div>
                    </div>
                </div>
                
                <button onclick="app.state.set('currentView', 'main')" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-colors">
                    Tilbake til hovedmeny
                </button>
            </div>
        `;
    }
    
    showTopicModal(topicId) {
        const topic = this.data.getDescription(topicId);
        if (!topic) return;
        
        const mainTopicId = topicId.split('.')[0];
        const colors = this.ui.getSectionColor(topicId);
        const isSubtopic = topicId.includes('.');
        const parentTopic = isSubtopic ? this.data.getParentTopic(topicId) : null;
        const subtopics = !isSubtopic ? this.data.getSubtopics(topicId) : [];
        
        const modal = document.createElement('div');
        modal.className = 'modal-backdrop fixed top-0 left-0 right-0 bottom-0 bg-black bg-opacity-50 z-50 overflow-y-auto -webkit-overflow-scrolling-touch';
        modal.innerHTML = `
            <div class="modal-content bg-white dark:bg-gray-900 min-h-full">
                <div class="max-w-md mx-auto">
                    <div class="sticky top-0 bg-white dark:bg-gray-900 p-4 border-b dark:border-gray-700 z-10 shadow-sm">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-bold" style="color: ${colors.main}">${topic.title}</h2>
                            <button onclick="this.closest('.modal-backdrop').remove()" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="p-4 space-y-4 relative z-0">
                        ${parentTopic ? `
                            <div class="flex items-center gap-2 text-sm">
                                <button onclick="app.showTopicModal('${parentTopic.id}')" 
                                        class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300">
                                    ← ${parentTopic.title}
                                </button>
                            </div>
                        ` : ''}
                        
                        <p class="text-gray-700 dark:text-gray-300 cursor-help relative translatable">${topic.description}</p>
                        
                        ${topic.learning_goals ? `
                            <div>
                                <h3 class="font-semibold mb-2">Læringsmål:</h3>
                                <ul class="list-disc list-inside space-y-1 text-sm text-gray-700 dark:text-gray-300">
                                    ${topic.learning_goals.map(goal => `
                                        <li class="cursor-help relative translatable">${goal}</li>
                                    `).join('')}
                                </ul>
                            </div>
                        ` : ''}
                        
                        ${topic.key_concepts && topic.key_concepts.length > 0 ? `
                            <div>
                                <h3 class="font-semibold mb-2">Nøkkelbegreper:</h3>
                                <div class="flex flex-wrap gap-2">
                                    ${topic.key_concepts.map(concept => {
                                        return `
                                            <span class="px-3 py-1 text-xs font-medium rounded-full ${colors.bg} ${colors.dark} ${colors.text} ${colors.darkText} ${colors.hover || ''} cursor-help relative translatable transition-all duration-200">
                                                ${concept}
                                            </span>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${subtopics.length > 0 ? `
                            <div>
                                <h3 class="font-semibold mb-2">Undertemaer:</h3>
                                <div class="space-y-2">
                                    ${subtopics.map((sub, index) => {
                                        const subtopicColors = this.ui.getSectionColor(sub.id, index);
                                        return `
                                            <button onclick="app.showTopicModal('${sub.id}')" 
                                                    class="w-full text-left p-3 ${subtopicColors.bg} ${subtopicColors.dark} ${subtopicColors.text} ${subtopicColors.darkText} ${subtopicColors.hover || ''} rounded-lg transition-all duration-200">
                                                <div class="font-medium text-sm">${sub.title}</div>
                                            </button>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${topic.url ? `
                            <div class="pt-2">
                                <a href="${topic.url}" target="_blank" rel="noopener noreferrer" 
                                class="inline-flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300">
                                    <span>Se opplæringsmateriale</span>
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                    </svg>
                                </a>
                            </div>
                        ` : ''}
                        
                        <button onclick="app.startQuiz('${topicId}')" 
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-colors">
                            Start quiz for ${topic.title}
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
        document.body.appendChild(modal);
    }
    
    startQuiz(topicId = null) {
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
        if (this.quiz.startQuiz(topicId)) {
            this.render();
        }
    }
    
    answerQuestion(originalIndex) {
        // Don't process clicks if in translation mode
        if (this.translation.isInTranslationMode()) {
            return;
        }
        
        const result = this.quiz.answerQuestion(originalIndex);
        if (!result) return;
        
        // Update UI - find buttons by their original index
        const buttons = document.querySelectorAll('.alternative-btn');
        buttons.forEach((btn) => {
            btn.disabled = true;
            const btnOriginalIndex = parseInt(btn.getAttribute('onclick')?.match(/answerQuestion\((\d+)\)/)?.[1] || '-1');
            
            if (btnOriginalIndex === result.correctIndex) {
                btn.classList.add('correct', 'border-glow');
            } else if (btnOriginalIndex === originalIndex && !result.isCorrect) {
                btn.classList.add('incorrect', 'shake');
            }
        });
        
        // Auto-advance
        setTimeout(() => {
            if (!this.quiz.nextQuestion()) {
                this.state.set('currentView', 'results');
            } else {
                this.render();
            }
        }, 1500);
    }
    
    navigateQuiz(direction) {
        const currentIndex = this.quiz.getCurrentQuestionIndex();
        this.quiz.navigateToQuestion(currentIndex + direction);
    }
    
    endQuiz() {
        const quiz = this.state.get('currentQuiz');
        if (quiz && quiz.answers.length === quiz.questions.length) {
            // Quiz is complete, show results
            this.state.set('currentView', 'results');
        } else {
            // Quiz is incomplete, just exit without confirmation
            this.state.update({
                currentView: 'main',
                currentQuiz: null,
                viewingIndex: null
            });
        }
    }
}

// Initialize app
const app = new App();
document.addEventListener('DOMContentLoaded', () => {
    app.init();
});

// Make app globally accessible for onclick handlers
window.app = app;
</script>
</body>
</html>
